<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="baccarat-style.css">
</head>
<body>
    <div class="container">
        <h2>Baccarat Predictor</h2>
        <div id="prediction" class="predict-box">ခန့်မှန်းချက်...</div>
        
        <input type="file" id="zipInput" onchange="handleZipUpload(this.files)">
        <button onclick="trainAllData()">JSON/Live အကုန် Train မယ်</button>

        <div class="btn-group">
            <button class="btn btn-player" onclick="addResult('P')">PLAYER</button>
            <button class="btn btn-banker" onclick="addResult('B')">BANKER</button>
            <button class="btn btn-tie" onclick="addResult('T')">TIE</button>
        </div>

        <div style="margin-top: 15px;">
            <button onclick="undoLast()">နောက်ဆုံးတစ်ခု ပြန်ဖျက်</button>
            <button onclick="resetGame()">ဝိုင်းသစ်စ</button>
            <button onclick="saveResults()">Save Data</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
<div id="status" style="color: yellow; margin: 10px 0; font-size: 14px;">ဖိုင်များတင်ရန် စောင့်ဆိုင်းနေသည်...</div>
<div id="fileCount" style="color: cyan; margin-bottom: 10px;">Database ထဲမှာ ဖိုင် - 0 ခု ရှိသည်။</div>
